<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanya Guru | Arabic9 Fun</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2EC4B6;
            --primary-dark: #239c91;
            --accent: #FF9F1C;
            --text-main: #011627;
            --bg-body: #FDFFFC;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(46, 196, 182, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdfc;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navbar Sederhana --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800; font-size: 1.4rem; color: var(--text-main);
            display: flex; align-items: center; gap: 10px;
        }
        .logo i { color: var(--primary); }

        .btn-back {
            text-decoration: none; color: var(--text-main); font-weight: 700;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        /* --- Container Utama --- */
        .contact-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .contact-card {
            background: var(--white);
            border-radius: 30px;
            box-shadow: var(--shadow);
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            overflow: hidden;
            border: 2px solid #eefbfb;
        }

        /* --- Sisi Kiri (Info) --- */
        .contact-info {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .contact-info::before {
            content: ''; position: absolute; top: -50px; left: -50px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .contact-info::after {
            content: ''; position: absolute; bottom: -30px; right: -30px;
            width: 200px; height: 200px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .contact-info h1 { font-family: 'Tajawal', sans-serif; font-size: 2.5rem; margin-bottom: 15px; }
        .contact-info p { opacity: 0.9; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }
        
        .info-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .info-icon {
            width: 45px; height: 45px; background: rgba(255,255,255,0.2);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* --- Sisi Kanan (Form) --- */
        .contact-form { padding: 50px; }
        .contact-form h2 { color: var(--primary-dark); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; font-weight: 700; margin-bottom: 8px; color: #555; font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%; padding: 12px 15px; border: 2px solid #eee;
            border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary); outline: none;
            box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.1);
        }

        textarea.form-control { resize: vertical; min-height: 120px; }

        .btn-send {
            width: 100%; background: var(--accent); color: white;
            padding: 15px; border: none; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 159, 28, 0.3);
        }
        .btn-send:hover { background: #e88d0c; transform: translateY(-2px); }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-card { grid-template-columns: 1fr; }
            .contact-info { padding: 40px 30px; text-align: center; }
            .info-item { justify-content: center; }
            .contact-form { padding: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fas fa-shapes"></i> Arabic9 Fun
        </div>
        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali ke Menu
        </a>
    </nav>

    <div class="contact-container">
        <div class="contact-card">
            
            <div class="contact-info">
                <h1>Tanya Guru</h1>
                <p>Bingung dengan materi bahasa Arab? Jangan malu bertanya! Pak Guru siap membantu menjelaskan kembali.</p>
                
                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-user-tie"></i></div>
                    <div>
                        <small>Guru Pengampu</small>
                        <div style="font-weight: bold;">Bpk. Muhammad Yushfa Dzihni</div>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-envelope"></i></div>
                    <div>
                        <small>Email</small>
                        <div style="font-weight: bold;">m.yushfadzihni@gmail.com</div>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="fas fa-school"></i></div>
                    <div>
                        <small>Sekolah</small>
                        <div style="font-weight: bold;">SMP Nurul Huda Mergosono</div>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h2>Kirim Pesan</h2>
                
                <form action="https://formspree.io/f/YOUR_FORMSPREE_ID_HERE" method="POST">
                    
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" placeholder="Contoh: Ahmad Zaky" required>
                    </div>

                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label>Kelas</label>
                            <select name="kelas" class="form-control" required>
                                <option value="9A">9A</option>
                                <option value="9B">9B</option>
                                <option value="9C">9C</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label>Bab / Materi</label>
                            <select name="bab" class="form-control">
                                <option value="Umum">Umum</option>
                                <option value="Bab 1">Bab 1</option>
                                <option value="Bab 2">Bab 2</option>
                                <option value="Bab 3">Bab 3</option>
                                <option value="Bab 4">Bab 4</option>
                                <option value="Bab 5">Bab 5</option>
                                <option value="Bab 6">Bab 6</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pertanyaan / Pesan</label>
                        <textarea name="pesan" class="form-control" placeholder="Pak, saya masih bingung tentang..." required></textarea>
                    </div>

                    <button type="submit" class="btn-send">
                        Kirim Pertanyaan <i class="fas fa-paper-plane"></i>
                    </button>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
