<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Interaktif | Arabic9 Fun</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Nunito:wght@400;700&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- STYLE DASAR (Konsisten dengan index) --- */
        :root {
            --primary: #48CAE4; --primary-dark: #0096C7; --accent: #FFB703;
            --text-dark: #2b2d42; --bg-light: #edf2f4; --white: #ffffff;
            --correct: #2a9d8f; --wrong: #e76f51;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg-light); color: var(--text-dark); }
        .ar { font-family: 'Amiri', serif; direction: rtl; }
        
        /* --- LAYOUT --- */
        nav {
            background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; color: var(--primary-dark); font-size: 1.5rem; display: flex; gap: 10px; align-items: center; }
        .back-link { font-weight: 700; color: var(--text-dark); }
        .back-link:hover { color: var(--primary); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 250px 1fr; gap: 30px; }

        /* --- SIDEBAR MENU --- */
        .quiz-sidebar { background: var(--white); padding: 20px; border-radius: 20px; height: fit-content; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .quiz-sidebar h3 { margin-bottom: 15px; color: var(--primary-dark); }
        .quiz-menu { list-style: none; }
        .quiz-menu li { margin-bottom: 10px; }
        .quiz-btn {
            width: 100%; text-align: left; padding: 10px 15px; background: transparent; border: 2px solid #eee;
            border-radius: 10px; cursor: pointer; font-weight: 700; color: #666; transition: 0.3s;
        }
        .quiz-btn:hover, .quiz-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .semester-label { font-size: 0.8rem; color: #999; margin: 15px 0 5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* --- QUIZ AREA --- */
        .quiz-content { background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); min-height: 500px; }
        .quiz-header { border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 30px; }
        .quiz-header h1 { font-family: 'Tajawal', sans-serif; color: var(--primary-dark); }
        .quiz-score-box { display: none; background: #e0fbfc; padding: 15px; border-radius: 10px; margin-top: 10px; color: var(--primary-dark); font-weight: 800; }

        /* --- SOAL STYLES --- */
        .question-card { margin-bottom: 30px; border-bottom: 1px dashed #eee; padding-bottom: 20px; }
        .q-text { font-size: 1.1rem; margin-bottom: 15px; font-weight: 700; display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }
        .q-tag { font-size: 0.7rem; background: #eee; padding: 2px 8px; border-radius: 4px; color: #666; margin-right: 10px; vertical-align: middle; }
        
        /* Pilihan Ganda */
        .options-grid { display: grid; gap: 10px; }
        .option-label {
            display: flex; align-items: center; padding: 12px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .option-label:hover { border-color: var(--primary); background: #f8fbff; }
        .option-label input { margin-right: 10px; }
        
        /* Feedback Colors */
        .correct-answer { border-color: var(--correct); background: #e6fffa; }
        .wrong-answer { border-color: var(--wrong); background: #ffebe6; }

        /* Esai */
        textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-family: inherit; margin-top: 10px; resize: vertical; }
        textarea:focus { outline: none; border-color: var(--primary); }
        
        .feedback-box { 
            display: none; margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid var(--accent); font-size: 0.9rem; 
        }

        /* Tombol Aksi */
        .action-area { margin-top: 40px; display: flex; gap: 15px; }
        .btn-submit { background: var(--primary-dark); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .btn-submit:hover { background: var(--primary); }
        .btn-reset { background: #eee; color: #666; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .quiz-sidebar { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fas fa-shapes" style="color: var(--accent);"></i> Arabic9 Fun
        </div>
        <a href="index.html" class="back-link"><i class="fas fa-home"></i> Kembali ke Beranda</a>
    </nav>

    <div class="container">

            <ul class="quiz-menu">

                <li><button class="quiz-btn" onClick="loadQuiz('bab2')">Bab 2: Maulid Nabi</button></li>
                <li><button class="quiz-btn" onClick="loadQuiz('bab3')">Bab 3: Nuzulul Quran</button></li>
                <li><button class="quiz-btn" onClick="loadQuiz('uts1')">⚡ Latihan Tengah Semester</button></li>
                
                <div class="semester-label">Semester 2</div>
                <li><button class="quiz-btn" onClick="loadQuiz('bab4')">Bab 4: Keindahan Alam</button></li>
                <li><button class="quiz-btn" onClick="loadQuiz('bab5')">Bab 5: Penciptaan Alam</button></li>
                <li><button class="quiz-btn" onClick="loadQuiz('bab6')">Bab 6: Menjaga Lingkungan</button></li>
                <li><button class="quiz-btn" onClick="loadQuiz('ujian_akhir')">🏆 UJIAN AKHIR (UAS)</button></li>
            </ul>
        </aside>

        <main class="quiz-content">

            </div>

            <form id="quiz-form">
                <div id="questions-container">
                    </div>

                    <button type="button" class="btn-reset" onClick="resetQuiz()">Ulangi</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        // --- DATABASE SOAL (JSON) ---
        const quizDatabase = {

            "bab1": {

                questions: [

                    { type: "mcq", question: "<span class='ar'>مَتَى يَحْتَفِلُ الْمُسْلِمُوْنَ بِرَأْسِ السَّنَةِ الْهِجْرِيَّةِ؟</span>", options: ["<span class='ar'>فِي الْأَوَّلِ مِنْ مُحَرَّم</span>", "<span class='ar'>فِي الْعَاشِرِ مِنْ مُحَرَّم</span>", "<span class='ar'>فِي الْأَوَّلِ مِنْ رَمَضَان</span>", "<span class='ar'>فِي الْأَوَّلِ مِنْ شَوَّال</span>"], correct: 0 },
                    { type: "mcq", question: "<span class='ar'>مَا هُوَ مُرَادِفُ كَلِمَةِ 'هَاجَرَ'؟</span>", options: ["<span class='ar'>رَجَعَ إِلَى وَطَنِهِ</span>", "<span class='ar'>سَافَرَ وَتَرَكَ وَطَنَهُ</span>", "<span class='ar'>قَاتَلَ فِي السَّبِيْلِ</span>", "<span class='ar'>عَمِلَ بِجِدٍّ</span>"], correct: 1 },
                    { type: "mcq", question: "<span class='ar'>أَكْمِلِ الْجُمْلَةَ: ... الْمُهَاجِرُوْنَ مِنْ مَكَّةَ إِلَى الْمَدِيْنَةِ</span>", options: ["<span class='ar'>وَصَلَ</span>", "<span class='ar'>هَاجَرَ</span>", "<span class='ar'>جَلَسَ</span>", "<span class='ar'>كَتَبَ</span>"], correct: 1 },

            // ================== BAB 3 ==================
            "bab3": {

        // --- LOGIKA UTAMA ---
        let currentQuizId = 'bab1';

        function loadQuiz(quizId) {
            currentQuizId = quizId;
            const data = quizDatabase[quizId] || { title: "Segera Hadir", questions: [] };
            
            // Update Title
            document.getElementById('quiz-title').innerText = data.title;
            document.getElementById('score-display').style.display = 'none';
            
            // Update Active Menu (Solusi Anti-Error)
            document.querySelectorAll('.quiz-btn').forEach(btn => btn.classList.remove('active'));
            let activeBtn = document.querySelector(`button[onClick="loadQuiz('${quizId}')"]`);
            if(activeBtn) activeBtn.classList.add('active');

            // Render Soal
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            if (data.questions.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">Belum ada soal untuk topik ini.</p>';
                return;
            }

            data.questions.forEach((q, index) => {
                let html = `<div class="question-card" id="card-${index}">`;
                
                // Label Tipe Soal
                let tag = q.type === 'mcq' ? 'Pilihan Ganda' : (q.type === 'essay-short' ? 'Isian Singkat' : 'Uraian');
                
                html += `<div class="q-text"><span class="q-tag">${index+1}. ${tag}</span> ${q.question}</div>`;

                // Render Input berdasarkan Tipe (Saat ini semua MCQ sesuai request UTS/UAS)
                if (q.type === 'mcq') {
                    html += `<div class="options-grid">`;
                    q.options.forEach((opt, i) => {
                        html += `
                            <label class="option-label" id="opt-${index}-${i}">
                                <input type="radio" name="q${index}" value="${i}">
                                ${opt}
                            </label>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `<textarea name="q${index}" rows="3" placeholder="Tulis jawaban Anda di sini..."></textarea>`;
                }

                // Tempat Feedback
                html += `<div class="feedback-box" id="feedback-${index}"></div>`;
                html += `</div>`;

                container.innerHTML += html;
            });
        }

        function submitQuiz() {
            const data = quizDatabase[currentQuizId];
            if (!data || data.questions.length === 0) return;

            let score = 0;
            let totalWeight = 0; // Bobot nilai

            data.questions.forEach((q, index) => {
                const feedbackEl = document.getElementById(`feedback-${index}`);
                feedbackEl.style.display = 'block';
                
                if (q.type === 'mcq') {
                    totalWeight += 1;
                    const selected = document.querySelector(`input[name="q${index}"]:checked`);
                    
                    // Reset Styles
                    for (let i=0; i<4; i++) {
                        const el = document.getElementById(`opt-${index}-${i}`);
                        if(el) el.classList.remove('correct-answer', 'wrong-answer');
                    }

                    if (selected) {
                        const val = parseInt(selected.value);
                        if (val === q.correct) {
                            score += 1;
                            document.getElementById(`opt-${index}-${val}`).classList.add('correct-answer');
                            feedbackEl.innerHTML = `<span style="color:var(--correct); font-weight:bold;">Jawaban Benar!</span>`;
                        } else {
                            document.getElementById(`opt-${index}-${val}`).classList.add('wrong-answer');
                            // Highlight yang benar
                            document.getElementById(`opt-${index}-${q.correct}`).classList.add('correct-answer');
                            feedbackEl.innerHTML = `<span style="color:var(--wrong); font-weight:bold;">Jawaban Salah.</span> Yang benar adalah opsi ke-${q.correct+1}.`;
                        }
                    } else {
                        feedbackEl.innerHTML = `<span style="color:var(--wrong);">Tidak dijawab.</span>`;
                    }
                }
            });

            // Hitung Nilai Akhir
            let finalScore = 0;
            if (totalWeight > 0) {
                finalScore = Math.round((score / totalWeight) * 100);
            }

            // Tampilkan Skor
            const scoreBox = document.getElementById('score-display');
            document.getElementById('final-score').innerText = finalScore;
            scoreBox.style.display = 'block';
            window.scrollTo(0, 0); // Scroll ke atas
        }

        function resetQuiz() {
            document.getElementById('quiz-form').reset();
            document.querySelectorAll('.feedback-box').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.option-label').forEach(el => el.classList.remove('correct-answer', 'wrong-answer'));
            document.getElementById('score-display').style.display = 'none';
        }

        // Load Bab 1 saat pertama buka
        currentQuizId = 'bab1';
        const dataStart = quizDatabase['bab1'];
        document.getElementById('quiz-title').innerText = dataStart.title;
        loadQuiz('bab1');
    </script>
