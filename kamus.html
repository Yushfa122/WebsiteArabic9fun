        /* --- STYLE DASAR (MENGADOPSI DARI INDEX) --- */
        :root {
            --primary: #2EC4B6;
            --primary-dark: #239c91;
            --accent: #FF9F1C;
            --secondary: #E71D36;
            --text-main: #011627;
            --bg-body: #FDFFFC;
            --radius: 25px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            background-image: radial-gradient(#2ec4b6 0.8px, transparent 0.8px), radial-gradient(#2ec4b6 0.8px, var(--bg-body) 0.8px);
            background-size: 30px 30px;
        }
        .ar { font-family: 'Amiri', serif; direction: rtl; }

        /* HEADER */
        .header-kamus {
            background: linear-gradient(135deg, var(--secondary), #ff5b70);
            padding: 30px 5% 60px; 
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
            box-shadow: 0 10px 30px rgba(231, 29, 54, 0.2);
        }

        .back-btn {
            color: white; font-size: 1.1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: 700;
            background: rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 50px; transition: 0.3s;
        }
        .back-btn:hover { background: white; color: var(--secondary); }

        .header-content { text-align: center; margin-top: 10px; }
        .header-content h1 { font-family: 'Tajawal', sans-serif; font-size: 2.5rem; margin-bottom: 10px; }
        .header-content p { font-size: 1.1rem; opacity: 0.9; }

        /* SEARCH BOX */
        .search-container {
            max-width: 700px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            background: white;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px solid #eee;
            transition: 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent); transform: scale(1.02); }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-family: 'Nunito', sans-serif;
            border-radius: 50px;
        }

        .search-box button {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover { background: #ff8c00; transform: rotate(90deg); }

        /* LIST KOSAKATA */
        .dictionary-area {
            max-width: 1000px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .word-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .word-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(46, 196, 182, 0.15);
        }

        .word-arab {
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .word-indo {
            font-size: 1.1rem;
            color: var(--text-main);
            font-weight: 700;
            border-top: 2px dashed #eee;
            padding-top: 10px;
        }

        .category-tag {
            position: absolute;
            top: 10px; left: 10px;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cat-verb { background: #e0f2f1; color: #00695c; }
        .cat-noun { background: #fff3e0; color: #e65100; }

        /* NOT FOUND STATE */
        .no-result {
            text-align: center;
            width: 100%;
            grid-column: 1 / -1;
            padding: 40px;
            display: none;
        }
        .no-result i { font-size: 3rem; color: #ccc; margin-bottom: 15px; }
        .no-result p { color: #888; font-size: 1.2rem; }

</head>

        // FUNGSI RENDER LIST
        function renderDictionary(data) {
            const listContainer = document.getElementById('dictionaryList');
            const noResult = document.getElementById('noResult');
            
            listContainer.innerHTML = '';

            if (data.length === 0) {
                noResult.style.display = 'block';
            } else {
                noResult.style.display = 'none';
                data.forEach(word => {
                    const tagClass = word.type === 'verb' ? 'cat-verb' : 'cat-noun';
                    const tagName = word.type === 'verb' ? 'Kata Kerja (فِعْل)' : 'Kata Benda/Sifat (اِسْم)';

                    const card = `
                        <div class="word-card">
                            <span class="category-tag ${tagClass}">${tagName}</span>
                            <div class="word-arab ar">${word.arab}</div>
                            <div class="word-indo">${word.indo}</div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });
            }
        }

        // FUNGSI SEARCH
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredData = vocabulary.filter(item => {
                return item.indo.toLowerCase().includes(keyword) || item.arab.includes(keyword);
            });
            renderDictionary(filteredData);
        });

        // RENDER AWAL
        renderDictionary(vocabulary);

    </script>
